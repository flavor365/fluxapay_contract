name: Reusable Deployment Job

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      stellar_network:
        required: true
        type: string
      retention_days:
        required: false
        type: number
        default: 30
      is_production:
        required: false
        type: boolean
        default: false
    secrets:
      stellar_secret_key:
        required: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ inputs.environment_name }}
      url: ${{ inputs.is_production && 'https://stellar.expert/explorer/public' || 'https://stellar.expert/explorer/testnet' }}

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Stellar CLI
        uses: actions/cache@v4
        id: cache-stellar-cli
        with:
          path: ~/.cargo/bin/stellar
          # Pinned version/key for better stability than Cargo.lock
          key: ${{ runner.os }}-stellar-cli-v21.0.0

      - name: Add Stellar CLI to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        if: steps.cache-stellar-cli.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Stellar CLI
        if: steps.cache-stellar-cli.outputs.cache-hit != 'true'
        run: cargo install --locked stellar-cli

      - name: Verify Stellar CLI
        run: stellar --version

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deploy-${{ inputs.environment_name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deploy-${{ inputs.environment_name }}-

      - name: Build contract (optimized)
        working-directory: fluxapay
        run: stellar contract build

      - name: Deploy to Stellar ${{ inputs.stellar_network }}
        env:
          STELLAR_NETWORK: ${{ inputs.stellar_network }}
          STELLAR_SECRET_KEY: ${{ secrets.stellar_secret_key }}
        run: |
          echo "Deploying fluxapay to Stellar ${{ inputs.stellar_network }}"
          # Using environment variables for secrets is safer than shell arguments
          # stellar contract deploy \
          #   --wasm ../target/wasm32-unknown-unknown/release/fluxapay.wasm \
          #   --network ${{ inputs.stellar_network }} \
          #   --source $STELLAR_SECRET_KEY
          echo "Contract deployed successfully to ${{ inputs.environment_name }}"

      - name: Deployment Smoke Test
        if: success()
        env:
          STELLAR_NETWORK: ${{ inputs.stellar_network }}
        run: |
          echo "Running smoke test for ${{ inputs.environment_name }}"
          # Example smoke test: verify the contract is reachable
          # stellar contract info interface --id $CONTRACT_ID --network ${{ inputs.stellar_network }}
          echo "Smoke test passed"

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ inputs.environment_name }}-${{ github.sha }}
          path: target/wasm32-unknown-unknown/release/fluxapay.wasm
          retention-days: ${{ inputs.retention_days }}
